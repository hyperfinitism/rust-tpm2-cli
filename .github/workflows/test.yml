name: Test

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/actions/install-tpm2-tss/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/actions/install-tpm2-tss/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - "1.88.0"
          - stable
        os-arch:
          - ubuntu-24.04-x86_64
          - ubuntu-24.04-aarch64
        include:
          - os-arch: ubuntu-24.04-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os-arch: ubuntu-24.04-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.target }}
      - uses: ./.github/actions/install-tpm2-tss
      # - run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config
      - run: sudo apt-get update && sudo apt-get install -y swtpm
      - run: cargo test --all-targets
